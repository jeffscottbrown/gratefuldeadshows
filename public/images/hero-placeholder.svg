<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <radialGradient id="sky" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="60%" stop-color="#0a1a2a"/>
      <stop offset="100%" stop-color="#050a10"/>
    </radialGradient>
    <radialGradient id="globe" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#0d4a6e"/>
      <stop offset="100%" stop-color="#062a40"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1200" height="500" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.6">
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="250" cy="30" r="1"/>
    <circle cx="400" cy="80" r="1.5"/>
    <circle cx="600" cy="20" r="1"/>
    <circle cx="750" cy="60" r="1.5"/>
    <circle cx="900" cy="40" r="1"/>
    <circle cx="1050" cy="70" r="1.5"/>
    <circle cx="1150" cy="30" r="1"/>
    <circle cx="180" cy="110" r="1"/>
    <circle cx="320" cy="150" r="1.5"/>
    <circle cx="820" cy="90" r="1"/>
    <circle cx="980" cy="130" r="1.5"/>
  </g>

  <!-- Globe -->
  <circle cx="600" cy="280" r="200" fill="url(#globe)" opacity="0.8"/>
  <ellipse cx="600" cy="280" rx="200" ry="60" fill="none" stroke="#1e6a8a" stroke-width="1" opacity="0.5"/>
  <ellipse cx="600" cy="280" rx="200" ry="110" fill="none" stroke="#1e6a8a" stroke-width="1" opacity="0.4"/>
  <line x1="600" y1="80" x2="600" y2="480" stroke="#1e6a8a" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="280" x2="800" y2="280" stroke="#1e6a8a" stroke-width="1" opacity="0.4"/>

  <!-- Eiffel Tower (left) -->
  <g transform="translate(160,240)">
    <polygon points="20,0 28,80 12,80" fill="#e8b84b" opacity="0.9"/>
    <rect x="10" y="80" width="20" height="5" fill="#e8b84b" opacity="0.9"/>
    <rect x="8" y="85" width="24" height="5" fill="#e8b84b" opacity="0.8"/>
    <rect x="5" y="90" width="30" height="40" fill="#e8b84b" opacity="0.7"/>
  </g>

  <!-- Golden Gate Bridge (right) -->
  <g transform="translate(960,220)">
    <rect x="0" y="60" width="8" height="80" fill="#c0392b" opacity="0.9"/>
    <rect x="72" y="60" width="8" height="80" fill="#c0392b" opacity="0.9"/>
    <path d="M4,60 Q40,30 76,60" fill="none" stroke="#c0392b" stroke-width="3" opacity="0.9"/>
    <line x1="0" y1="140" x2="80" y2="140" stroke="#555" stroke-width="4" opacity="0.8"/>
  </g>

  <!-- Gateway Arch (center-left) -->
  <g transform="translate(420,200)">
    <path d="M0,120 Q30,-20 60,120" fill="none" stroke="#e8b84b" stroke-width="6" opacity="0.9"/>
  </g>

  <!-- Red Rocks (center-right) -->
  <g transform="translate(700,300)">
    <polygon points="0,80 40,0 80,80" fill="#8B2500" opacity="0.8"/>
    <polygon points="60,80 100,20 140,80" fill="#A33000" opacity="0.8"/>
    <polygon points="30,80 70,30 110,80" fill="#6B1D00" opacity="0.7"/>
  </g>

  <!-- MSG / skyscraper (far right area) -->
  <g transform="translate(860,250)">
    <rect x="0" y="0" width="30" height="100" fill="#4a5568" opacity="0.7"/>
    <rect x="5" y="10" width="4" height="6" fill="#e8b84b" opacity="0.8"/>
    <rect x="13" y="10" width="4" height="6" fill="#e8b84b" opacity="0.8"/>
    <rect x="21" y="10" width="4" height="6" fill="#e8b84b" opacity="0.8"/>
    <rect x="5" y="25" width="4" height="6" fill="#e8b84b" opacity="0.6"/>
    <rect x="13" y="25" width="4" height="6" fill="#e8b84b" opacity="0.8"/>
    <rect x="21" y="25" width="4" height="6" fill="#e8b84b" opacity="0.6"/>
  </g>

  <!-- Dancing bears (colorful, simple) -->
  <!-- Bear 1 (purple) -->
  <g transform="translate(290,310)">
    <circle cx="15" cy="8" r="8" fill="#9b59b6"/>
    <circle cx="10" cy="5" r="3" fill="#9b59b6"/>
    <circle cx="20" cy="5" r="3" fill="#9b59b6"/>
    <rect x="8" y="15" width="14" height="20" rx="4" fill="#9b59b6"/>
    <line x1="8" y1="18" x2="0" y2="30" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="18" x2="30" y2="25" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="8" y2="48" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="22" y2="48" stroke="#9b59b6" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Bear 2 (red) -->
  <g transform="translate(490,290)">
    <circle cx="15" cy="8" r="8" fill="#e74c3c"/>
    <circle cx="10" cy="5" r="3" fill="#e74c3c"/>
    <circle cx="20" cy="5" r="3" fill="#e74c3c"/>
    <rect x="8" y="15" width="14" height="20" rx="4" fill="#e74c3c"/>
    <line x1="8" y1="18" x2="-2" y2="25" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="18" x2="32" y2="30" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="8" y2="48" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="22" y2="48" stroke="#e74c3c" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Bear 3 (teal) -->
  <g transform="translate(670,295)">
    <circle cx="15" cy="8" r="8" fill="#0d9488"/>
    <circle cx="10" cy="5" r="3" fill="#0d9488"/>
    <circle cx="20" cy="5" r="3" fill="#0d9488"/>
    <rect x="8" y="15" width="14" height="20" rx="4" fill="#0d9488"/>
    <line x1="8" y1="18" x2="0" y2="28" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
    <line x1="22" y1="18" x2="30" y2="22" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
    <line x1="10" y1="35" x2="8" y2="48" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="22" y2="48" stroke="#0d9488" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Swirling lines / psychedelic accents -->
  <path d="M50,400 Q200,350 350,400 Q500,450 650,400 Q800,350 950,400 Q1100,450 1150,400" fill="none" stroke="#e8b84b" stroke-width="1.5" opacity="0.3"/>
  <path d="M0,450 Q200,420 400,450 Q600,480 800,450 Q1000,420 1200,450" fill="none" stroke="#9b59b6" stroke-width="1.5" opacity="0.2"/>

  <!-- Placeholder text overlay -->
  <text x="600" y="460" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white" opacity="0.3">
    Replace with AI-generated hero image (see app/page.tsx for prompt)
  </text>
</svg>
